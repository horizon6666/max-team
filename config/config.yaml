server:
  port: 8080
  mode: cli

llm:
  default_provider: anthropic
  default_model: auto-max

  providers:
    anthropic:
      api_key: ${ANTHROPIC_AUTH_TOKEN}
      base_url: ${ANTHROPIC_BASE_URL}
    # openai:
    #   api_key: ${OPENAI_API_KEY}
    #   base_url: https://api.openai.com

  max_retries: 3
  timeout: 120s

audit:
  enabled: true
  output: logs/audit.jsonl
  level: info

project:
  root: .
  sandbox: true
